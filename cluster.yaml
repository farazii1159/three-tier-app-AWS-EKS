apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig
metadata:
  name: demo-cluster-three-tier-1
  region: us-east-2
  version: "1.32"

# OIDC zaroor enable karein, ye add-ons ke liye zaroori hai
iam:
  withOIDC: true 

managedNodeGroups:
  - name: standard-workers
    instanceType: t3.small
    minSize: 1
    maxSize: 3
    desiredCapacity: 2
    volumeSize: 20