apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig
metadata:
  name: demo-cluster-three-tier-1
  region: us-east-2
  version: "1.32"

iam:
  withOIDC: true

managedNodeGroups:
  - name: standard-workers
    instanceType: t3.small  # t3.small use karein, ye balance hai
    minSize: 1
    maxSize: 1
    desiredCapacity: 1
    volumeSize: 20
    